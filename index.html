<!DOCTYPE html>
<html>
<head>
  <title>Gleason Electric</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }
    header {
      background: #111827;
      padding: 20px;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 32px;
    }
    .hero {
      padding: 60px 20px;
      text-align: center;
    }
    .btn {
      background: #22c55e;
      color: black;
      padding: 15px 25px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    .section {
      padding: 40px 20px;
      max-width: 800px;
      margin: auto;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: none;
    }
    .form {
      background: #1f2937;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Gleason Electric</h1>
  <p>Residential • Commercial • EV Charging</p>
</header>

<div class="hero">
  <h2>Powering the Future of Electrical Work</h2>
  <p>EV Charging • Service Upgrades • New Installs</p>
  <button class="btn">Request a Free Quote</button>
</div>

<div class="section">
  <h2>Get a Free Estimate</h2>

  <div class="form">
    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Phone Number">
    <input type="email" placeholder="Email">
    <input type="text" placeholder="Address">

    <select>
      <option>Residential EV Charger</option>
      <option>Commercial EV Charging</option>
      <option>Electrical Service Upgrade</option>
      <option>New Installation</option>
    </select>

    <button class="btn">Submit Request</button>
  </div>
</div>

</body>
</html>
